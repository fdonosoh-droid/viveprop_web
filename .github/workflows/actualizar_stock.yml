name: Actualizar Stock Secundario

on:
  schedule:
    - cron: "0 9 * * *"   # 06:00 AM Chile (UTC-3)
  workflow_dispatch:        # permite ejecución manual desde GitHub

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar gsheet_to_stock.py
        run: python viveprop-platform/tools/gsheet_to_stock.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add viveprop-platform/frontend/public/data/stock.json
          git add viveprop-platform/data/stock.js
          if git diff --cached --quiet; then
            echo "Sin cambios en stock — nada que commitear."
          else
            git commit -m "chore: actualiza stock secundario $(date +'%Y-%m-%d')"
            git push
          fi
